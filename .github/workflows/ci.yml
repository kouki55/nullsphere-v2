name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ========================================
  # 1. TypeScript コンパイルチェック
  # ========================================
  typecheck:
    runs-on: ubuntu-latest
    name: TypeScript Type Check

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        run: npm run check

  # ========================================
  # 2. セキュリティスキャン (npm audit)
  # ========================================
  security:
    runs-on: ubuntu-latest
    name: Security Audit

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for critical vulnerabilities
        run: |
          CRITICAL=$(npm audit --json | jq '.metadata.vulnerabilities.critical // 0')
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Found $CRITICAL critical vulnerabilities"
            exit 1
          fi
          echo "✅ No critical vulnerabilities found"

  # ========================================
  # 3. Linting (ESLint)
  # ========================================
  lint:
    runs-on: ubuntu-latest
    name: ESLint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: npm run lint --if-present
        continue-on-error: true

  # ========================================
  # 4. ユニットテスト (Vitest)
  # ========================================
  test:
    runs-on: ubuntu-latest
    name: Unit Tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: npm run test --if-present
        continue-on-error: true

  # ========================================
  # 5. ビルド検証
  # ========================================
  build:
    runs-on: ubuntu-latest
    name: Build Verification
    needs: [typecheck, security, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: npm run build --if-present
        continue-on-error: true

      - name: Verify build artifacts
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build artifacts generated successfully"
          else
            echo "⚠️ No build artifacts found (this may be expected for server-only projects)"
          fi

  # ========================================
  # 6. 成功通知
  # ========================================
  notify-success:
    runs-on: ubuntu-latest
    name: CI Success Notification
    needs: [typecheck, security, lint, test, build]
    if: success()

    steps:
      - name: Print success message
        run: |
          echo "🎉 All CI checks passed!"
          echo "✅ TypeScript type check"
          echo "✅ Security audit"
          echo "✅ Linting"
          echo "✅ Unit tests"
          echo "✅ Build verification"
